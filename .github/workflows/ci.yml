name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  docker-test:
    name: Docker Test Suite
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build test image
      run: docker build -f Dockerfile.test -t sentiment-test:latest .

    - name: Lint (Ruff in container)
      run: |
        docker run --rm sentiment-test:latest \
          ruff check src tests scripts train.py update_model.py

    - name: Run pytest with coverage (in container)
      run: |
        mkdir -p htmlcov
        docker run --rm \
          -v "${{ github.workspace }}/htmlcov:/app/htmlcov" \
          sentiment-test:latest \
          pytest tests/ -v --cov=src --cov-report=term-missing --cov-report=html

    - name: Data pipeline smoke (in container)
      run: |
        docker run --rm sentiment-test:latest python -m src.data.ingest --help

    - name: Upload coverage HTML report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: htmlcov/
        retention-days: 30

  docker-api:
    name: Build API Docker Image
    runs-on: ubuntu-latest
    needs: docker-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build API Docker image
      run: docker build -f Dockerfile.api -t sentiment-api:latest .

    - name: API image smoke test
      run: |
        docker run --rm --entrypoint python sentiment-api:latest \
          -c "import src; import src.serving.app; print('API image import smoke OK')"
