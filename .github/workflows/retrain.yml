name: Retrain Model

on:
  workflow_dispatch:
    inputs:
      model_type:
        description: "Model type to train"
        required: true
        default: "baseline"
        type: choice
        options:
          - baseline
          - distilbert
      promote_to_production:
        description: "Promote latest version to Production"
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "0 3 * * 1"

jobs:
  retrain:
    name: Retrain and Register
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Seed fallback/registry model
      run: |
        python scripts/seed_model.py

    - name: Optional production promotion (manual runs)
      if: github.event_name == 'workflow_dispatch' && inputs.promote_to_production == true
      run: |
        python scripts/promote_model.py --stage Production
